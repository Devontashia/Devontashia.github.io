<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Box Framing</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <!-- Rectangular Frame -->
        <img id="frame1" src="images/house.jpeg" alt="Framed Image">

        <!-- Rounded Frame -->
        <img id="frame2" src="images/flower.jpeg" alt="Rounded Frame">

        <!-- Text Frame -->
        <h2 id="frame3">I am becoming everything I prayed for.</h2>

    </body>
</html>
