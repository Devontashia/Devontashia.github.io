<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bulletin Board (Exercise)</title>
        <link href="css/setup.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet" data-meal-prep>
    </head>
    <body>
        <div id="bulletin-board">
        <!-- ADD YOUR HTML CODE INSIDE OF THIS DIV -->
            <div class="split">
            <div class="post-it yellow">
                    <h1>Quote</h1>
                    <ul>
                    <p>    
                        <li>Be kind</li>
                        <li>Be patient</li>
                    </ul>
                  </p>
                    <p>
                        Everything is working out.

                    </p>
                </div>

                <br>

                <div class="split">
                <div class="post-it blue">
                    <h2>Ideas</h2>
                    <ul>
                    <p>
                        <li>New project</li>
                        <li>Design concept</li>
                        <li>Write it down.</li>
                    </ul>
                    </p>
                </div>

                <br>
                
                <div class="split">
                <div class="post-it pink">
                    <h2>Goals</h2>
                    <ul>
                    <p>
                        <li>Drink water</li>
                        <li>Stay positive</li>
                        <li>You got this.</li>
                    </ul>
                    </p>    
          </div>
    </body>
</html>
