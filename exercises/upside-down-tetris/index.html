<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Upside Down Tetris</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <div id="container">

            <!-- Row 1 -->
            <div class="block red"></div>
            <div class="block blue"></div>
            <div class="block green"></div>
            <div class="block yellow"></div>
            <div class="block red"></div>

            <!-- Row 2 -->
            <div class="block yellow"></div>
            <div class="block green"></div>
            <div class="block red"></div>
            <div class="block blue"></div>
            <div class="block yellow"></div>

            <!-- Row 3 -->
            <div class="block blue"></div>
            <div class="block red"></div>
            <div class="block yellow"></div>
            <div class="block green"></div>
            <div class="block blue"></div>
        </div>
    </body>
</html>
