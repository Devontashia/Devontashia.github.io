<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Widget Recreation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- WEATHER WIDGET -->
    <div id="weather">
        <img src="sun.svg" alt="Cloudy.">
        <p>14:26</p>
        <p id="condition">Sunny</p>
        <p>Boston, MA</p>
    </div>

    <!-- CALENDAR WIDGET -->
    <div id="calendar">
        <h5 class="title">June 2026</h5>
        <p class="subtitle">Upcoming Events</p>

        <div class="event">
            <h5>Mon</h5>
            <h4>24</h4>
            <p>Class Day</p>
        </div>

        <div class="event highlight">
            <h5>Fri</h5>
            <h4>28</h4>
            <p>Project Due</p>
        </div>
    </div>

    <!-- MUSIC WIDGET -->
    <div id="music">

        <div class="now-playing">
            <img src="album.png">
            <div class="info">
                <h3>Song Title</h3>
                <p>Artist Name</p>
            </div>
        </div>

        <div class="playlist">
            <img src="track1.png">
            <img src="track2.png">
            <img src="track3.png">
            <img src="track4.png">
        </div>

    </div>

</body>
</html>
