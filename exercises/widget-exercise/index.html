<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Box Model-Widgets</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
      <div id="weather">
                 <img src="images/sun.svg" alt="Cloudy.">
                 <p id="degrees">81&deg;</p>
                 <p>14:26</p>
                 <p id="date">
                     Wed 20 May
                        <br>
                      Seattle,WA
                 </p>
          </div>
          <div id="calendar">
    <h5 class="cal-title">Friday 26</h5>

    <div class="cal-box">
        <h5>Client Meeting</h5>
        <h4>Work</h4>
        <p>10:15AM-11:30AM</p>
    </div>

    <div class="cal-box cal-box-two">
        <h5>Hangout with friends</h5>
        <h4>Personal</h4>
        <p>4:00PM-6:00PM</p>
    </div>
</div>
<div id="music">

    <div class="music-box">
        <img src="images/album-0.jpg" alt="Song Cover">
        <div class="music-info">
            <h3>All I Really Want</h3>
            <p>Alanis Morissette</p>
        </div>
    </div>

    <div class="music-box">
        <img src="images/album-1.jpg" alt="Album 1">
        <img src="images/album-2.jpg" alt="Album 2">
        <img src="images/album-3.jpg" alt="Album 3">
        <img src="images/album-4.jpg" alt="Album 4">
    </div>

</div>

    </body>
</html>
