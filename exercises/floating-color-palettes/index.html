<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating Color Palettes</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <div class="color-palette">
            <h2>Soft Sunset</h2>
            <h4 class="color" id="color-1">#F7B2AD</h4>
            <h4 class="color" id="color-2">#FCD7B6</h4>
            <h4 class="color" id="color-3">#F9EEDC</h4>
        </div>

        <div class="color-palette">
            <h2>Ocean Breeze</h2>
            <h4 class="color" id="color-4">#A7D8DE</h4>
            <h4 class="color" id="color-5">#74B3CE</h4>
            <h4 class="color" id="color-6">#508CA4</h4>
        </div>

        <div class="color-palette">
            <h2>Royal Garden</h2>
            <h4 class="color" id="color-7">#6A5ACD</h4>
            <h4 class="color" id="color-8">#98FB98</h4>
            <h4 class="color" id="color-9">#2E8B57</h4>
        </div>

    </body>
</html>
